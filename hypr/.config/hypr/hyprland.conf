# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Use defaults Omarchy defaults (but don't edit these directly!)
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# Change your own setup in these files (and overwrite any settings from defaults!)
# source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

# Add any other personal Hyprland configuration below
# windowrule = workspace 5, class:qemu

# Автоматичне налаштування моніторів при старті
exec-once = kanshi

# -----------------------------------------------------
# Google Meet PiP - Fixed Position & Size
# -----------------------------------------------------

# 1. Force Size (240x360) using initialTitle
#    Matches "Meet - ...", "Picture-in-Picture", or anything with "google.com" in the start title.
windowrulev2 = float, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*
windowrulev2 = size 240 360, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*

# 2. Force Position: Bottom Right
#    Logic: Monitor Width - (240 width + 20 margin) = monitor_w-260
#    Logic: Monitor Height - (360 height + 20 margin) = monitor_h-380
windowrulev2 = move (monitor_w-260) (monitor_h-380), class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*

# 3. Visuals & Behavior
windowrulev2 = pin, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*
windowrulev2 = noinitialfocus, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*
windowrulev2 = suppressevent maximize fullscreen, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*
windowrulev2 = bordersize 0, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*
windowrulev2 = rounding 0, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*
windowrulev2 = noshadow, class:^(google-chrome)$, initialTitle:.*(Meet|Picture-in-Picture|google\.com).*


# -----------------------------------------------------
# Screen Share Indicator - Bottom Center
# -----------------------------------------------------
windowrulev2 = float, initialTitle:^(.*sharing your screen.*)$
windowrulev2 = pin, initialTitle:^(.*sharing your screen.*)$
windowrulev2 = noinitialfocus, initialTitle:^(.*sharing your screen.*)$
windowrulev2 = bordersize 0, initialTitle:^(.*sharing your screen.*)$
windowrulev2 = rounding 0, initialTitle:^(.*sharing your screen.*)$

# Math: (Screen Width / 2) - (Window Width / 2) | Screen Height - 80px
windowrulev2 = move ((monitor_w-window_w)/2) (monitor_h-80), initialTitle:^(.*sharing your screen.*)$
